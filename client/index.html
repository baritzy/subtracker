<!doctype html>
<html lang="he" dir="rtl" style="color-scheme: only light; background-color: #f1f5f9;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="color-scheme" content="only light" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="מנויים" />
    <meta name="description" content="נהל את כל המנויים שלך במקום אחד" />

    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <title>מעקב מנויים</title>

    <!-- Early theme: runs before React so no wrong-theme flash.
         We also set color-scheme directly via JS inline style —
         LightningCSS strips the 'only' keyword from CSS files, so we bypass it here. -->
    <script>
      (function () {
        var h = document.documentElement;
        var t = localStorage.getItem('theme_v2');
        if (t === 'dark') {
          h.setAttribute('data-theme', 'dark');
          h.style.colorScheme = 'dark';
          h.style.backgroundColor = '#060b14';
          h.style.color = '#f1f5f9';
        } else {
          // Reinforce: keep the inline style already set on the html tag
          h.style.colorScheme = 'only light';
          h.style.backgroundColor = '#f1f5f9';
          h.style.color = '#0f172a';
        }
      })();
    </script>
  </head>
  <style>
    /* LightningCSS strips 'only' from color-scheme in processed CSS files.
       This inline <style> is NOT processed by Vite/LightningCSS, so 'only' survives. */
    :root { color-scheme: only light; }
    html[data-theme="dark"] { color-scheme: dark; }
    html, body { margin: 0; padding: 0; background-color: #f1f5f9; }
    html[data-theme="dark"], html[data-theme="dark"] body { background-color: #060b14; }
    #preloader {
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      background: #f1f5f9;
    }
    html[data-theme="dark"] #preloader { background: #060b14; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <body>
    <div id="root">
      <div id="preloader">
        <img src="/icons/icon-192.png" alt="SubTracker" style="width:56px;height:56px;border-radius:16px;"/>
        <div style="width:32px;height:32px;border:3px solid rgba(99,102,241,0.3);border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
